name: Actualizar Lista M3U

on:
  schedule:
    - cron: "0 * * * *"  # Ejecuta el workflow al inicio de cada hora
  workflow_dispatch:      # Permite ejecutar manualmente

permissions:
  contents: write
  pull-requests: write

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libxml2-dev \
            libxslt-dev \
            libnspr4 \
            libnss3 \
            libdbus-1-3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2 \
            fonts-liberation

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar navegadores de Playwright
        run: |
          python -m playwright install chromium

      - name: Ejecutar script de scraping
        run: python script.py

      - name: Configurar usuario de Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Sincronizar con repositorio remoto
        run: |
          git pull --rebase origin main || true

      - name: Commit y push de cambios
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Actualizar lista M3U
          file_pattern: lista.m3u
          push_options: --force-with-lease

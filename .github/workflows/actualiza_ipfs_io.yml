name: ipfs_io Update

on:
  schedule:
    # Se ejecuta cada hora
    - cron: '0 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente

# Permisos necesarios para que el bot pueda escribir en el repo
permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v7

      # - name: Configurar Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.10'

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run update script
        run: python script_ipfs_io.py

      - name: Verificar y Subir cambios
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          
          git pull
          
          # Añadimos el m3u y el log generado
            git add ipfs_io.m3u
            
          # Solo hace el commit si hay cambios reales para evitar errores
          if git diff --staged --quiet; then
            echo "No hay cambios en la lista de canales."
          else
            git commit -m "Update IPFS IO: $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
            git push
          fi
